    // 修改confirmExportName函数，支持按货号创建独立文件夹
    async function confirmExportName() {
        const exportName = document.getElementById('exportName').value.trim();
        if (!exportName) {
            alert('请输入压缩包名称');
            return;
        }
        
        // 检查是否需要同时导出 Excel
        const exportExcel = document.getElementById('exportExcel').checked;
        
        // 关闭命名模态框
        closeModal('exportNameModal');
        
        // 打开进度模态框
        const exportProgressModal = document.getElementById('exportProgressModal');
        const exportModalTitle = exportProgressModal.querySelector('.modal-title');
        if (exportModalTitle) {
            exportModalTitle.textContent = '导出图片';
        }
        exportProgressModal.classList.add('active');
        
        // 初始化导出变量
        exportZip = new JSZip();
        exportCanceled = false;
        
        // 确定要导出的照片：只导出勾选的照片
        let photosToExport = window.selectedBatchPhotos || [];
        const exportType = window.exportType || 'normal';
        
        // 如果没有批量选择的照片，检查是否有勾选的货号
        if (photosToExport.length === 0) {
            // 获取当前页面的状态
            const currentView = document.getElementById('currentView').textContent;
            let status = 'all';
            if (currentView === '全部照片') {
                status = 'all';
            } else if (currentView === '已导出照片') {
                status = 'exported';
            } else if (currentView === '未导出照片') {
                status = 'unexported';
            }
            
            // 从 selectedProductCodes 中获取所有选中的货号
            const selectedProductCodesSet = selectedProductCodes[status] || new Set();
            const selectedCodes = Array.from(selectedProductCodesSet);
            
            if (selectedCodes.length === 0) {
                closeModal('exportProgressModal');
                alert('请先选择要导出的货号');
                return;
            }
            
            // 收集选中货号的照片
            photosToExport = filteredPhotos.filter(photo => {
                if (!photo) return false;
                // 检查照片的货号是否在选中的分组键中
                return selectedCodes.some(groupKey => {
                    const groupProductCode = groupKey.split('_')[0];
                    return groupProductCode.replace(/\s+/g, '') === (photo.productCode || '').replace(/\s+/g, '');
                });
            });
        }
        
        // 检查是否有符合条件的照片
        if (photosToExport.length === 0) {
            closeModal('exportProgressModal');
            alert('没有符合条件的照片可导出');
            return;
        }
        
        // 清除批量选择的照片
        window.selectedBatchPhotos = null;
        window.exportType = null;
        
        // 统计每个纯货号的出现次数，用于检测重复（区分大小写）
        const productCodeCount = {};
        photosToExport.forEach(photo => {
            let productCode = photo.productCode;
            if (productCode) {
                // 去除时间戳、随机码和批次ID，只保留纯货号
                // 先处理下划线分隔的情况（如 123-1_1774004192518）
                if (productCode.includes('_')) {
                    const parts = productCode.split('_');
                    if (parts.length > 1) {
                        productCode = parts[0];
                    }
                }
                
                // 处理连字符分隔的情况，去除批次ID（如 123-1-1774004192518-abc123）
                if (productCode.includes('-')) {
                    // 找到最后一个连字符，去除后面的批次ID
                    const lastHyphenIndex = productCode.lastIndexOf('-');
                    if (lastHyphenIndex > 0) {
                        const lastPart = productCode.substring(lastHyphenIndex + 1);
                        // 检查最后一部分是否为批次ID（包含数字和字母）
                        if (/^[0-9a-zA-Z]+$/.test(lastPart) && lastPart.length > 5) {
                            productCode = productCode.substring(0, lastHyphenIndex);
                        }
                    }
                }
                
                // 直接使用原始货号进行统计，区分大小写
                productCodeCount[productCode] = (productCodeCount[productCode] || 0) + 1;
            }
        });
        
        try {
            // 如果需要同时导出 Excel
            if (exportExcel) {
                // 先导出 Excel
                await exportToExcel();
            }
            
            // 更新进度条
            updateExportProgress(0, '正在准备导出图片...');
            
            let successfullyExported = 0;
            const failedExports = [];
            
            // 为每张照片创建下载链接并添加到压缩包
            const downloadPromises = [];
            
            photosToExport.forEach((photo, i) => {
                if (!photo || !photo.filename || !photo.path) {
                    failedExports.push({
                        filename: photo ? photo.filename : '未知文件名',
                        productCode: photo ? photo.productCode : '未知货号',
                        error: '无效的照片数据'
                    });
                    return;
                }
                
                const promise = (async () => {
                    try {
                        const encodedPath = encodeURI(photo.path);
                        const response = await fetch(encodedPath);
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        const blob = await response.blob();
                        
                        // 处理文件名，确保去除时间戳和随机码
                        let exportFilename = photo.filename;
                        
                        // 1. 先处理下划线分隔的情况（如 123-1_1774004192518.jpg）
                        if (exportFilename.includes('_')) {
                            const parts = exportFilename.split('_');
                            if (parts.length > 1) {
                                // 只保留下划线前的部分
                                exportFilename = parts[0];
                            }
                        }
                        // 2. 再处理连字符分隔的情况（如 123-1-1774004192518.jpg）
                        else if (exportFilename.includes('-')) {
                            const parts = exportFilename.split('-');
                            if (parts.length > 2) {
                                // 检查最后一部分是否为时间戳（纯数字）
                                const lastPart = parts[parts.length - 1];
                                if (/^\d+$/.test(lastPart)) {
                                    // 只保留前两部分（货号+后缀）
                                    exportFilename = parts.slice(0, 2).join('-');
                                }
                            }
                        }
                        
                        // 3. 处理复杂货号格式，提取原始货号（如 Ac-1774006823873-202400-ha916j1ls）
                        let pureProductCode = photo.productCode;
                        if (pureProductCode) {
                            // 分割货号
                            const parts = pureProductCode.split('-');
                            // 找到第一个非数字部分作为原始货号
                            let originalProductCode = '';
                            for (const part of parts) {
                                if (!/^[0-9]+$/.test(part) && part.length < 5) {
                                    originalProductCode = part;
                                    break;
                                }
                            }
                            // 如果找到了原始货号，使用它
                            if (originalProductCode) {
                                pureProductCode = originalProductCode;
                            }
                        }
                        
                        // 确保文件名有扩展名
                        if (!exportFilename.includes('.')) {
                            // 从path中提取扩展名
                            const pathParts = photo.path.split('.');
                            if (pathParts.length > 1) {
                                const extension = pathParts.pop();
                                // 确保是有效的图片扩展名
                                const validImageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
                                if (validImageExtensions.includes(extension.toLowerCase())) {
                                    exportFilename = `${exportFilename}.${extension}`;
                                }
                            }
                        }
                        
                        // 根据导出类型决定如何添加到压缩包
                        if (exportType === 'individual' && pureProductCode) {
                            // 按原始货号创建独立文件夹，去除空格
                            const folderName = pureProductCode.replace(/\s+/g, '');
                            exportZip.folder(folderName).file(exportFilename, blob);
                        } else {
                            // 直接添加到根目录
                            exportZip.file(exportFilename, blob);
                        }
                        
                        successfullyExported++;
                        
                        // 更新进度条
                        updateExportProgress((i / photosToExport.length) * 100, `正在导出图片: ${photo.filename}...`);
                    } catch (error) {
                        console.error(`处理照片 ${photo.filename} 失败:`, error);
                        failedExports.push({
                            filename: photo.filename,
                            productCode: photo.productCode || '未知货号',
                            error: error.message
                        });
                    }
                })();
                
                downloadPromises.push(promise);
            });
            
            // 等待所有照片下载完成
            await Promise.all(downloadPromises);
            
            // 处理失败的导出
            if (failedExports.length > 0) {
                // 创建失败导出的简易表格
                const failedExportCSV = generateFailedExportCSV(failedExports);
                const failedBlob = new Blob([failedExportCSV], { type: 'text/csv;charset=utf-8;' });
                
                // 添加到压缩包
                exportZip.file('导出失败列表.csv', failedBlob);
            }
            
            updateExportProgress(90, '正在生成图片压缩包...');
            
            // 生成压缩包
            const zipBlob = await exportZip.generateAsync({ type: 'blob' }, function(metadata) {
                const progress = 90 + (metadata.percent / 10);
                updateExportProgress(progress, `正在生成图片压缩包...`);
            });
            
            updateExportProgress(100, '图片导出完成！');
            
            // 创建下载链接
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipBlob);
            link.download = `${exportName}.zip`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 标记导出的照片为已导出并更新服务器
            for (let i = 0; i < photosToExport.length; i++) {
                const photo = photosToExport[i];
                if (photo) {
                    photo.exported = true;
                    // 异步更新服务器上的导出状态
                    fetch(`/api/photos/${photo.id}/exported`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ exported: true })
                    }).catch(error => {
                        console.error('更新导出状态失败:', error);
                    });
                }
            }
            
            // 显示完成消息
            setTimeout(() => {
                closeModal('exportProgressModal');
                let message = `成功导出 ${successfullyExported} 张图片到压缩包: ${exportName}.zip`;
                if (failedExports.length > 0) {
                    message += `\n有 ${failedExports.length} 张图片导出失败，已在压缩包中生成"导出失败列表.csv"`;
                }
                alert(message);
            }, 1000);
            
        } catch (error) {
            console.error('导出失败:', error);
            closeModal('exportProgressModal');
            alert('导出失败，请重试');
        }
    }

    // 打开修改货号和后缀模态框
    function openEditProductCodeModal(groupKey) {
        // 创建模态框
        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">修改货号和后缀</h3>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editProductCode">货号：</label>
                        <input type="text" id="editProductCode" placeholder="请输入货号" required>
                    </div>
                    <div class="form-group">
                        <label for="editProductSuffix">后缀：</label>
                        <select id="editProductSuffix" class="filter-select">
                            <option value="">无后缀</option>
                            <option value="-1">-1 (递增格式：-1, -2, -3)</option>
                            <option value="(1)">(1) (递增格式：(1), (2), (3))</option>
                        </select>
                    </div>
                    <input type="hidden" id="editGroupKey" value="${groupKey}">
                </div>
                <div class="modal-footer">
                    <button class="action-btn secondary" onclick="closeEditProductCodeModal()">取消</button>
                    <button class="action-btn primary" onclick="(async function() { await saveProductCodeChanges(); })()">保存</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        // 提取当前货号和后缀
        let productCode = groupKey.split('_')[0];
        let suffix = '';
        
        // 去除随机码部分，只保留纯货号
        // 查找最后两个连字符的位置，去除时间戳和随机数
        const hyphens = productCode.match(/-/g);
        if (hyphens && hyphens.length >= 2) {
            // 找到倒数第二个连字符的位置
            let lastHyphenIndex = productCode.lastIndexOf('-');
            let secondLastHyphenIndex = productCode.lastIndexOf('-', lastHyphenIndex - 1);
            if (secondLastHyphenIndex > 0) {
                // 提取货号和后缀部分
                productCode = productCode.substring(0, secondLastHyphenIndex);
            }
        }
        
        // 处理带括号的后缀，如 159(1)
        const bracketMatch = productCode.match(/^(.*?)\(\d+\)$/);
        if (bracketMatch) {
            productCode = bracketMatch[1];
            suffix = '(1)';
        }
        // 处理带连字符的后缀，如 159-1
        else if (productCode.includes('-') && productCode.split('-').length > 1) {
            const parts = productCode.split('-');
            if (parts.length === 2 && /^\d+$/.test(parts[1])) {
                suffix = '-' + parts[1];

    // 添加拖拽功能
    function addDragFunctionality() {
        if (!cropAreaElement) return;
        
        cropAreaElement.onmousedown = function(e) {
            isDragging = true;
            startX = e.clientX - cropAreaElement.offsetLeft;
            startY = e.clientY - cropAreaElement.offsetTop;
            document.body.style.cursor = 'move';
        };
        
        document.onmousemove = function(e) {
            if (!isDragging) return;
            
            const container = cropAreaElement.parentElement;
            const containerRect = container.getBoundingClientRect();
            
            let newX = e.clientX - containerRect.left - startX;
            let newY = e.clientY - containerRect.top - startY;
            
            // 限制在容器内
            newX = Math.max(0, Math.min(newX, container.clientWidth - cropAreaElement.clientWidth));
            newY = Math.max(0, Math.min(newY, container.clientHeight - cropAreaElement.clientHeight));
            
            cropAreaElement.style.left = newX + 'px';
            cropAreaElement.style.top = newY + 'px';
            
            // 更新输入框值
            document.getElementById('cropX').value = Math.round(newX);
            document.getElementById('cropY').value = Math.round(newY);
        };
        
        document.onmouseup = function() {
            isDragging = false;
            document.body.style.cursor = '';
        };
    }
    
    // 重置裁剪区域
    function resetCrop() {
        if (!cropImageElement || !cropAreaElement) return;
        
        const imageWidth = cropImageElement.naturalWidth;
        const imageHeight = cropImageElement.naturalHeight;
        
        // 设置默认裁剪区域为300x300，居中显示
        const cropWidth = 300;
        const cropHeight = 300;
        const cropX = Math.max(0, (imageWidth - cropWidth) / 2);
        const cropY = Math.max(0, (imageHeight - cropHeight) / 2);
        
        // 更新裁剪区域样式
        cropAreaElement.style.width = cropWidth + 'px';
        cropAreaElement.style.height = cropHeight + 'px';
        cropAreaElement.style.left = cropX + 'px';
        cropAreaElement.style.top = cropY + 'px';
        
        // 更新输入框值
        document.getElementById('cropWidth').value = cropWidth;
        document.getElementById('cropHeight').value = cropHeight;
        document.getElementById('cropX').value = Math.round(cropX);
        document.getElementById('cropY').value = Math.round(cropY);
    }

    function fitToImage() {
        if (!cropImageElement || !cropAreaElement) return;
        
        const imageWidth = cropImageElement.naturalWidth;

    // 裁剪照片
    async function cropPhoto() {
        if (!cropImageElement || !currentPhotoId) return;
        
        // 获取裁剪参数
        const cropWidth = parseInt(document.getElementById('cropWidth').value);
        const cropHeight = parseInt(document.getElementById('cropHeight').value);
        const cropX = parseInt(document.getElementById('cropX').value);
        const cropY = parseInt(document.getElementById('cropY').value);
        
        // 创建Canvas元素
        const canvas = document.createElement('canvas');
        canvas.width = cropWidth;
        canvas.height = cropHeight;
        const ctx = canvas.getContext('2d');
        
        // 绘制裁剪区域
        ctx.drawImage(
            cropImageElement,
            cropX, cropY, cropWidth, cropHeight,
            0, 0, cropWidth, cropHeight
        );
        
        // 转换为Blob并上传到服务器
        canvas.toBlob(async function(blob) {
            try {
                // 创建FormData对象
                const formData = new FormData();
                formData.append('photo', blob, 'cropped.jpg');
                
                // 上传到服务器
                const response = await fetch(`/api/photos/${currentPhotoId}`, {
                    method: 'PUT',
                    body: formData
                });
                
                if (response.ok) {
                    alert('裁剪成功，已覆盖原图！');
                    // 重新加载数据以更新视图
                    loadPhotos();
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    alert(`裁剪失败: ${errorData.error || '服务器错误'}`);
                }
            } catch (error) {
                console.error('裁剪失败:', error);
                alert('裁剪失败: 网络错误');
            } finally {
                // 关闭裁剪模态框
                closeModal('cropModal');
            }
        }, 'image/jpeg', 0.9);
    }
    
    // 压缩图片函数
    function compressImage(base64, quality) {
        return new Promise((resolve, reject) => {
            const canvas = document.createElement('canvas');
            const img = new Image();
            
            img.onload = function() {
                // 设置画布大小
                canvas.width = img.width;
                canvas.height = img.height;
                
                // 绘制图片
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                // 压缩图片
                const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                
                // 提取base64部分
                const base64Part = compressedDataUrl.split(',')[1];
                resolve(base64Part);
            };
            
            img.onerror = function() {
                reject(new Error('图片加载失败'));
            };
            
            img.src = base64;
        });
    }

        }
    }
    
    // 编辑用户
    async function editUser(id) {
        try {
            const response = await fetch(`/api/auth/users/${id}`);
            if (!response.ok) {
                throw new Error('获取用户信息失败');
            }
            
            const user = await response.json();
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editPassword').value = '';
            document.getElementById('editRole').value = user.role;
            
            document.getElementById('editUserModal').classList.add('active');
        } catch (error) {
            console.error('编辑用户失败:', error);
            alert('获取用户信息失败');
        }
    }
    
    // 更新用户
    async function updateUser() {
        const id = document.getElementById('editUserId').value;
        const name = document.getElementById('editName').value.trim();
        const password = document.getElementById('editPassword').value;
        const role = document.getElementById('editRole').value;
        
        if (!name) {
            alert('姓名为必填字段');
            return;
        }
        
        const updates = { role, name };
        if (password) {
            updates.password = password;
        }
        
        try {
            const response = await fetch(`/api/auth/users/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updates)
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || '更新失败');
            }
            
            const result = await response.json();
            alert('用户更新成功！');
            closeModal('editUserModal');
            loadUsers();
        } catch (error) {
            console.error('更新用户失败:', error);
            alert(`更新失败: ${error.message}`);
        }
    }
    
    // 确认删除用户
    function confirmDeleteUser(id) {
        currentUserId = id;
        document.getElementById('deleteUserModal').classList.add('active');
    }
    
    // 确认删除用户
    async function confirmDeleteUserAction() {
        if (!currentUserId) return;
        
        try {
            const response = await fetch(`/api/auth/users/${currentUserId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ role: currentUserRole })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || '删除失败');
            }
            
            const result = await response.json();
            alert('用户删除成功！');
            closeModal('deleteUserModal');
            loadUsers();
        } catch (error) {
            console.error('删除用户失败:', error);
            alert(`删除失败: ${error.message}`);
        }
    }
    
    // 事件监听器
    document.addEventListener('DOMContentLoaded', function() {
        // 搜索输入事件
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', filterPhotos);
        }
        
        // 产品筛选事件
        const productFilter = document.getElementById('productFilter');
        if (productFilter) {
            productFilter.addEventListener('change', filterPhotos);
        }
    });
    
    // 打开修改密码模态框
    function openChangePasswordModal() {
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        document.getElementById('changePasswordModal').classList.add('active');
    }
    
    // 修改密码
    async function changePassword() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!currentPassword || !newPassword || !confirmPassword) {
            alert('请填写所有必填字段');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            alert('两次输入的新密码不一致');
            return;
        }
        
        try {
            const response = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    username: localStorage.getItem('adminUsername'),
                    currentPassword, 
                    newPassword 
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || '修改密码失败');
            }
            
            const result = await response.json();
            alert('密码修改成功！');
            closeModal('changePasswordModal');
        } catch (error) {
            console.error('修改密码失败:', error);
            alert(`修改密码失败: ${error.message}`);
        }
    }
    
    // 点击模态框外部关闭
    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    });
    
    // 页面加载时恢复日期值 - 确保在DOM完全加载后执行
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            restoreDateValues();
        });
    } else {
        restoreDateValues();
    }
    </script>
</body>
</html>
