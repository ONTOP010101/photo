        // 下载照片
        function downloadPhoto() {
            if (currentPhotoPath) {
                const link = document.createElement('a');
                link.href = currentPhotoPath;
                link.download = currentPhotoPath.split('/').pop() || 'photo.jpg';
                link.click();
            }
        }
        
        // 关闭模态框
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
                
                // 如果是裁剪模态框，移除裁剪事件监听器
                if (modalId === 'cropModal') {
                    removeCropEvents();
                }
                
                // 如果是扫码模态框，释放摄像头资源
                if (modalId === 'scanModal') {
                    const video = document.getElementById('scanVideo');
                    if (video && video.srcObject) {
                        video.srcObject.getTracks().forEach(track => {
                            track.stop();
                        });
                        video.srcObject = null;
                    }
                }
            }
        }
        
        // 处理共享
        function handleShare() {
            const shareCode = document.getElementById('shareCode').value.trim();
            const qrcodeContainer = document.getElementById('qrcodeContainer');
            
            // 如果已经显示了二维码，创建房间并关闭窗口
            if (qrcodeContainer.style.display === 'block') {
                // 验证共享码是否为4位数
                if (shareCode.length !== 4 || !/^\d+$/.test(shareCode)) {
                    alert('请输入4位数共享码');
                    return;
                }
                // 创建新共享房间，使用相同的4位数字作为房间名称和共享码
                const shareName = 'ROOM' + shareCode;
                createShare(shareName, shareCode);
                // 关闭共享模态框
                closeModal('shareModal');
                return false;
            }
            
            if (shareCode) {
                // 验证共享码是否为4位数
                if (shareCode.length !== 4 || !/^\d+$/.test(shareCode)) {
                    alert('请输入4位数共享码');
                    return;
                }
                // 加入共享
                joinShare(shareCode);
            } else {
                // 生成4位随机码
                const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
                // 填充共享码输入框
                document.getElementById('shareCode').value = randomCode;
                // 显示二维码
                const shareName = 'ROOM' + randomCode;
                showQRCode(randomCode, shareName);
            }
            // 阻止默认行为，防止页面刷新
            return false;
        }
        
        // 打开扫码模态框
        function openScanModal() {
            const scanModal = document.getElementById('scanModal');
            scanModal.style.opacity = '1';
            scanModal.style.visibility = 'visible';
            scanModal.querySelector('.modal-content').style.transform = 'translateY(0) scale(1)';
            
            // 启动摄像头
            startScanner();
        }
        
        // 启动扫码
        function startScanner() {
            const video = document.getElementById('scanVideo');
            
            // 尝试使用不同的API获取摄像头
            const getUserMedia = navigator.mediaDevices && navigator.mediaDevices.getUserMedia ||
                               navigator.getUserMedia ||
                               navigator.webkitGetUserMedia ||
                               navigator.mozGetUserMedia ||
                               navigator.msGetUserMedia;
            
            if (getUserMedia) {
                // 标准化API调用
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    // 先尝试使用后置摄像头
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                        .then(stream => {
                            video.srcObject = stream;
                            video.play();
                            
                            // 开始扫描
                            scanQRCode(video);
                        })
                        .catch(error => {
                            console.error('无法访问后置摄像头:', error);
                            // 如果后置摄像头不可用，尝试使用前置摄像头
                            navigator.mediaDevices.getUserMedia({ video: true })
                                .then(stream => {
                                    video.srcObject = stream;
                                    video.play();
                                    
                                    // 开始扫描
                                    scanQRCode(video);
                                })
                                .catch(error => {
                                    console.error('无法访问摄像头:', error);
                                    alert('无法访问摄像头，请检查权限设置');
                                    closeModal('scanModal');
                                });
                        });
                } else {
                    console.error('浏览器不支持getUserMedia API');
                    alert('您的浏览器不支持扫码功能');
                    closeModal('scanModal');
                }
            }
            
            // 扫码处理
            function scanQRCode(video) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                function captureFrame() {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // 这里可以添加QR码识别逻辑
                        // 由于没有内置的QR码识别库，这里简化处理
                        // 实际项目中可以使用jsQR等库
                    }
                    requestAnimationFrame(captureFrame);
                }
                
                captureFrame();
            }
            
            // 加入共享
            function joinShare(shareCode) {
                currentShareCode = shareCode;
                try {
                    localStorage.setItem('currentShareCode', shareCode);
                } catch (error) {
                    console.error('localStorage访问被阻止:', error);
                }
                updateShareRoomStatus();
                closeModal('shareModal');
                alert('成功加入共享房间');
            }
            
            // 创建共享
            function createShare(shareName, shareCode) {
                currentShareCode = shareCode;
                try {
                    localStorage.setItem('currentShareCode', shareCode);
                } catch (error) {
                    console.error('localStorage访问被阻止:', error);
                }
                updateShareRoomStatus();
                alert('成功创建共享房间');
            }
            
            // 退出共享房间
            function leaveShareRoom() {
                currentShareCode = null;
                currentShareInfo = null;
                try {
                    localStorage.removeItem('currentShareCode');
                } catch (error) {
                    console.error('localStorage访问被阻止:', error);
                }
                updateShareRoomStatus();
                alert('已退出共享房间');
            }
            
            // 更新共享房间状态
            function updateShareRoomStatus() {
                const shareRoomStatus = document.getElementById('shareRoomStatus');
                const roomNameDisplay = document.getElementById('roomNameDisplay');
                
                if (currentShareCode) {
                    shareRoomStatus.style.display = 'flex';
                    roomNameDisplay.textContent = '共享房间: ' + currentShareCode;
                } else {
                    shareRoomStatus.style.display = 'none';
                }
            }
            
            // 显示二维码
            function showQRCode(code, name) {
                const qrcodeContainer = document.getElementById('qrcodeContainer');
                const qrcode = document.getElementById('qrcode');
                const roomCodeDisplay = document.getElementById('roomCodeDisplay');
                
                // 清空之前的二维码
                qrcode.innerHTML = '';
                
                // 生成新的二维码
                new QRCode(qrcode, {
                    text: window.location.origin + '?shareCode=' + code,
                    width: 150,
                    height: 150,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                roomCodeDisplay.textContent = '房间号: ' + code;
                qrcodeContainer.style.display = 'block';
            }
        }
        
        // 打开裁剪模态框
        function openCropModal() {
            // 获取裁剪相关元素
            cropImagePreview = document.getElementById('cropImagePreview');
            cropFrame = document.getElementById('cropFrame');
            
            // 创建图像对象
            cropImage = new Image();
            cropImage.onload = function() {
                // 重置变量
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
                
                // 设置图像源
                cropImagePreview.src = capturedImage;
                
                // 等待图像加载完成后设置初始状态
                setTimeout(() => {
                    const container = cropImagePreview.parentElement;
                    const containerRect = container.getBoundingClientRect();
                    const imageRect = cropImagePreview.getBoundingClientRect();
                    
                    // 设置初始裁剪框大小为图片大小加上5px边距，并缩小10%
                    const margin = 5;
                    const initialWidth = (imageRect.width + margin * 2) * 0.9;
                    const initialHeight = (imageRect.height + margin * 2) * 0.9;
                    const initialLeft = (containerRect.width - initialWidth) / 2;
                    const initialTop = (containerRect.height - initialHeight) / 2;
                    
                    // 设置裁剪框位置和大小
                    cropFrame.style.width = initialWidth + 'px';
                    cropFrame.style.height = initialHeight + 'px';
                    cropFrame.style.left = initialLeft + 'px';
                    cropFrame.style.top = initialTop + 'px';
                    
                    // 初始化裁剪区域
                    cropArea = {
                        x: initialLeft,
                        y: initialTop,
                        width: initialWidth,
                        height: initialHeight
                    };
                    
                    // 绑定事件
                    bindCropEvents();
                }, 100);
            };
            cropImage.src = capturedImage;
            
            // 显示裁剪模态框
            const cropModal = document.getElementById('cropModal');
            cropModal.classList.add('active');
        }
        
        // 绑定裁剪事件
        function bindCropEvents() {
            if (!cropFrame) return;
            
            // 获取容器和图像
            const container = cropImagePreview.parentElement;
            const imageRect = cropImagePreview.getBoundingClientRect();
            
            // 调整裁剪框大小
            function startResize(e, handle) {
                e.preventDefault();
                isResizing = true;
                resizeHandle = handle;
                // 兼容触摸事件和鼠标事件
                const clientX = e.clientX || e.pageX || e.touches[0].clientX;
                const clientY = e.clientY || e.pageY || e.touches[0].clientY;
                startX = clientX;
                startY = clientY;
                startWidth = parseFloat(cropFrame.style.width) || 0;
                startHeight = parseFloat(cropFrame.style.height) || 0;
                startLeft = parseFloat(cropFrame.style.left) || 0;
                startTop = parseFloat(cropFrame.style.top) || 0;
            }
            
            function resize(e) {
                e.preventDefault();
                if (isResizing && resizeHandle) {
                    // 兼容触摸事件和鼠标事件
                    const clientX = e.clientX || e.pageX || e.touches[0].clientX;
                    const clientY = e.clientY || e.pageY || e.touches[0].clientY;
                    
                    const containerRect = container.getBoundingClientRect();
                    let newWidth = startWidth;
                    let newHeight = startHeight;
                    let newLeft = startLeft;
                    let newTop = startTop;
                    
                    switch (resizeHandle) {
                        case 'top-left':
                            newWidth = startWidth - (clientX - startX);
                            newHeight = startHeight - (clientY - startY);
                            newLeft = startLeft + (clientX - startX);
                            newTop = startTop + (clientY - startY);
                            break;
                        case 'top-right':
                            newWidth = startWidth + (clientX - startX);
                            newHeight = startHeight - (clientY - startY);
                            newTop = startTop + (clientY - startY);
                            break;
                        case 'bottom-left':
                            newWidth = startWidth - (clientX - startX);
                            newHeight = startHeight + (clientY - startY);
                            newLeft = startLeft + (clientX - startX);
                            break;
                        case 'bottom-right':
                            newWidth = startWidth + (clientX - startX);
                            newHeight = startHeight + (clientY - startY);
                            break;
                        case 'top':
                            newHeight = startHeight - (clientY - startY);
                            newTop = startTop + (clientY - startY);
                            break;
                        case 'bottom':
                            newHeight = startHeight + (clientY - startY);
                            break;
                        case 'left':
                            newWidth = startWidth - (clientX - startX);
                            newLeft = startLeft + (clientX - startX);
                            break;
                        case 'right':
                            newWidth = startWidth + (clientX - startX);
                            break;
                    }
                    
                    // 限制最小尺寸为一个合理的小值
                    const minSize = 50;
                    
                    if (newWidth < minSize) {
                        newWidth = minSize;
                        if (resizeHandle === 'top-left' || resizeHandle === 'bottom-left') {
                            newLeft = startLeft + startWidth - minSize;
                        }
                    }
                    if (newHeight < minSize) {
                        newHeight = minSize;
                        if (resizeHandle === 'top-left' || resizeHandle === 'top-right') {
                            newTop = startTop + startHeight - minSize;
                        }
                    }
                    
                    // 不限制在容器内，允许拉到外面
                    // 移除容器边界限制代码
                    
                    // 更新裁剪框
                    cropFrame.style.width = newWidth + 'px';
                    cropFrame.style.height = newHeight + 'px';
                    cropFrame.style.left = newLeft + 'px';
                    cropFrame.style.top = newTop + 'px';
                    
                    // 更新裁剪区域
                    cropArea = {
                        x: newLeft,
                        y: newTop,
                        width: newWidth,
                        height: newHeight
                    };
                }
            }
            
            function endResize() {
                isResizing = false;
                resizeHandle = null;
            }
            
            // 保存事件监听器的引用，以便后续移除
            window.cropEventListeners = {
                startResize: startResize,
                resize: resize,
                endResize: endResize
            };
            
            // 绑定所有控制点的事件
            const resizeHandles = cropFrame.querySelectorAll('.resize-handle');
            resizeHandles.forEach(handle => {
                const handleType = handle.classList[1];
                const handleStartResize = (e) => startResize(e, handleType);
                handle.addEventListener('mousedown', handleStartResize);
                handle.addEventListener('touchstart', handleStartResize, { passive: false });
                // 保存handle的事件监听器引用
                if (!window.resizeHandleListeners) {
                    window.resizeHandleListeners = [];
                }
                window.resizeHandleListeners.push({ handle, listener: handleStartResize });
            });
            
            document.addEventListener('mousemove', resize);
            document.addEventListener('touchmove', resize, { passive: false });
            document.addEventListener('mouseup', endResize);
            document.addEventListener('touchend', endResize);
            document.addEventListener('touchcancel', endResize);
        }
        
        // 移除裁剪事件监听器
        function removeCropEvents() {
            if (!window.cropEventListeners) return;
            
            const { resize, endResize } = window.cropEventListeners;
            
            // 移除文档事件监听器
            document.removeEventListener('mousemove', resize);
            document.removeEventListener('touchmove', resize);
            document.removeEventListener('mouseup', endResize);
            document.removeEventListener('touchend', endResize);
            document.removeEventListener('touchcancel', endResize);
            
            // 移除所有控制点的事件监听器
            if (window.resizeHandleListeners) {
                window.resizeHandleListeners.forEach(({ handle, listener }) => {
                    handle.removeEventListener('mousedown', listener);
                    handle.removeEventListener('touchstart', listener);
                });
                window.resizeHandleListeners = null;
            }
            
            // 清空事件监听器引用
            window.cropEventListeners = null;
        }
        
        // 确认裁剪
        function confirmCrop() {
            if (!cropImage || !cropImagePreview) return;
            
            // 创建裁剪后的画布
            const croppedCanvas = document.createElement('canvas');
            const croppedCtx = croppedCanvas.getContext('2d');
            
            // 获取容器和图像信息
            const container = cropImagePreview.parentElement;
            const containerRect = container.getBoundingClientRect();
            const imageRect = cropImagePreview.getBoundingClientRect();
            
            // 计算图像在容器中的缩放比例
            const scaleX = cropImage.width / imageRect.width;
            const scaleY = cropImage.height / imageRect.height;
            
            // 设置裁剪画布大小
            croppedCanvas.width = cropArea.width;
            croppedCanvas.height = cropArea.height;
            
            // 计算裁剪区域在原始图像上的坐标
            const cropX = (cropArea.x / containerRect.width) * imageRect.width * scaleX;
            const cropY = (cropArea.y / containerRect.height) * imageRect.height * scaleY;
            const cropWidth = (cropArea.width / containerRect.width) * imageRect.width * scaleX;
            const cropHeight = (cropArea.height / containerRect.height) * imageRect.height * scaleY;
            
            // 确保裁剪区域在图像范围内
            const finalCropX = Math.max(0, cropX);
            const finalCropY = Math.max(0, cropY);
            const finalCropWidth = Math.min(cropWidth, cropImage.width - finalCropX);
            const finalCropHeight = Math.min(cropHeight, cropImage.height - finalCropY);
            
            // 从原始图像裁剪
            croppedCtx.drawImage(
                cropImage,
                finalCropX,
                finalCropY,
                finalCropWidth,
                finalCropHeight,
                0,
                0,
                cropArea.width,
                cropArea.height
            );
            
            // 转换为base64
            const croppedImage = croppedCanvas.toDataURL('image/jpeg');
            
            // 更新全局变量
            capturedImage = croppedImage;
            capturedImageEl.src = croppedImage;
            
            // 更新照片列表中的指定照片
            if (window.currentCropIndex !== undefined && window.currentCropIndex >= 0 && window.currentCropIndex < capturedPhotos.length) {
                // 更新指定索引的照片
                capturedPhotos[window.currentCropIndex].url = croppedImage;
                // 清除裁剪索引
                window.currentCropIndex = undefined;
            } else if (capturedPhotos.length > 0) {
                // 默认为最后一张照片
                const lastPhoto = capturedPhotos[capturedPhotos.length - 1];
                lastPhoto.url = croppedImage;
            }
            
            // 更新照片列表显示
            updatePhotoGallery();
            
            // 关闭裁剪模态框
            closeModal('cropModal');
            
            alert('裁剪成功！');
        }
        
        // 返回表单
        function backToForm() {
            try {
                // 重置系统相机输入
                if (systemCameraInput) systemCameraInput.value = '';
                capturedImage = null;
                if (capturedImageEl) capturedImageEl.src = '';
                capturedPhotos = [];
                currentNumber = 1;
                
                // 清空照片列表
                updatePhotoGallery();
                
                // 隐藏预览区域，显示选项区域
                if (previewSection) previewSection.style.display = 'none';
                if (optionsSection) optionsSection.style.display = 'block';
                if (uploadPhotoBtn) uploadPhotoBtn.disabled = true;
                if (cropPhotoBtn) cropPhotoBtn.disabled = true;
                
                // 确保货号输入框获得焦点
                setTimeout(() => {
                    if (productCodeInput) {
                        productCodeInput.focus();
                    }
                }, 100);
                
                // 更新当前section并保存状态
                currentSection = 'options';
                saveState();
            } catch (error) {
                console.error('返回表单失败:', error);
                // 出错时强制显示选项界面
                try {
                    const optionsSection = document.querySelector('.options-section');
                    const previewSection = document.querySelector('.preview-section');
                    const productCodeInput = document.getElementById('productCode');
                    
                    if (optionsSection) optionsSection.style.display = 'block';
                    if (previewSection) previewSection.style.display = 'none';
                    if (productCodeInput) productCodeInput.focus();
                } catch (e) {
                    console.error('强制显示选项界面失败:', e);
                }
            }
        }
        
        // 处理扫码结果
        function processQRCode(data) {
            // 解析二维码数据
            if (data.includes('shareCode=')) {
                const shareCode = data.split('shareCode=')[1];
                if (shareCode && shareCode.length === 4) {
                    joinShare(shareCode);
                } else {
                    alert('无效的二维码');
                }
            } else {
                alert('无效的二维码');
            }
        }
    </script>
